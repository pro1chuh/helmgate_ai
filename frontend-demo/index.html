<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helm AI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='6' y='6' width='52' height='52' rx='14' fill='%236366F1'/%3E%3Cpath d='M21 17h8v12h6V17h8v30h-8V36h-6v11h-8V17z' fill='white'/%3E%3C/svg%3E">
<link rel="shortcut icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='6' y='6' width='52' height='52' rx='14' fill='%236366F1'/%3E%3Cpath d='M21 17h8v12h6V17h8v30h-8V36h-6v11h-8V17z' fill='white'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; font-size: inherit; }
a { text-decoration: none; }

/* ── Theme tokens ───────────────────────────────────────────────────────── */
:root {
  --bg:        #F7F8FC;
  --surface:   #FFFFFF;
  --surface2:  #F3F4F6;
  --border:    #E5E7EB;
  --border2:   #D1D5DB;
  --text:      #111827;
  --text2:     #374151;
  --muted:     #6B7280;
  --accent:    #6366F1;
  --accent-dk: #4F46E5;
  --accent-lt: #EEF2FF;
  --accent-lt2:#E0E7FF;
  --sidebar-w: 256px;
  --radius:    10px;
  --shadow:    0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.10);
}
[data-theme="dark"] {
  --bg:        #0F1117;
  --surface:   #1A1D27;
  --surface2:  #222533;
  --border:    #2A2D3A;
  --border2:   #353849;
  --text:      #E2E4EF;
  --text2:     #C4C9DD;
  --muted:     #6B7480;
  --accent-lt: rgba(99,102,241,.14);
  --accent-lt2:rgba(99,102,241,.22);
  --shadow:    0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.4);
}

/* ── Base ───────────────────────────────────────────────────────────────── */
html, body, #root { height: 100%; }
body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.5; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.spinner { display: inline-block; border-radius: 50%; border: 2px solid var(--border2); border-top-color: var(--accent); animation: spin .65s linear infinite; flex-shrink: 0; }
@keyframes logoFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-6px) scale(1.03); }
}
@keyframes loadingCardIn {
  from { opacity: 0; transform: translateY(12px) scale(.98); }
  to { opacity: 1; transform: none; }
}
@keyframes loadingOrbDrift {
  0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
  50% { transform: translate3d(18px, -14px, 0) scale(1.08); }
}
@keyframes logoSheen {
  0% { transform: translateX(-120%) rotate(18deg); opacity: 0; }
  35% { opacity: .55; }
  70%, 100% { transform: translateX(140%) rotate(18deg); opacity: 0; }
}
@keyframes logoPulse {
  0% { transform: scale(.8); opacity: .45; }
  70% { transform: scale(1.5); opacity: 0; }
  100% { transform: scale(1.65); opacity: 0; }
}
@keyframes dotBlink {
  0%, 80%, 100% { opacity: .28; transform: translateY(0); }
  40% { opacity: 1; transform: translateY(-3px); }
}
.loading-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(99,102,241,.16), transparent 28%),
    radial-gradient(circle at 80% 24%, rgba(99,102,241,.10), transparent 24%),
    linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 88%, white 12%) 100%);
}
.loading-orb {
  position: absolute;
  width: 320px;
  height: 320px;
  border-radius: 999px;
  filter: blur(56px);
  opacity: .28;
  pointer-events: none;
  animation: loadingOrbDrift 5.5s ease-in-out infinite;
}
.loading-orb--left {
  left: -80px;
  top: 12%;
  background: rgba(99,102,241,.38);
}
.loading-orb--right {
  right: -80px;
  bottom: 10%;
  background: rgba(129,140,248,.28);
  animation-delay: -2s;
}
.loading-card {
  position: relative;
  z-index: 1;
  width: min(420px, calc(100vw - 32px));
  padding: 38px 28px 30px;
  border-radius: 26px;
  border: 1px solid rgba(99,102,241,.12);
  background: color-mix(in srgb, var(--surface) 92%, white 8%);
  box-shadow: 0 30px 80px rgba(99,102,241,.10), var(--shadow-lg);
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  animation: loadingCardIn .38s cubic-bezier(.22,1,.36,1);
}
.loading-logo-wrap {
  position: relative;
  width: 84px;
  height: 84px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 18px;
}
.loading-logo-pulse {
  position: absolute;
  inset: 10px;
  border-radius: 22px;
  background: rgba(99,102,241,.22);
  animation: logoPulse 1.8s ease-out infinite;
}
.loading-logo {
  position: relative;
  z-index: 1;
  width: 72px;
  height: 72px;
  border-radius: 22px;
  background: linear-gradient(180deg, #7b7ef9 0%, #5b5ee8 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 34px;
  font-weight: 800;
  letter-spacing: 0;
  box-shadow: 0 18px 38px rgba(99,102,241,.30), inset 0 1px 0 rgba(255,255,255,.22);
  animation: logoFloat 2.6s ease-in-out infinite;
  overflow: hidden;
}
.loading-logo::after {
  content: "";
  position: absolute;
  top: -28%;
  bottom: -28%;
  width: 42%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.52), transparent);
  animation: logoSheen 2.4s ease-in-out infinite;
}
.loading-brand {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 0;
  margin-bottom: 8px;
}
.loading-label {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  margin-bottom: 14px;
}
.loading-dots {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.loading-dots span {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--accent);
  animation: dotBlink 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: .15s; }
.loading-dots span:nth-child(3) { animation-delay: .3s; }
@media (prefers-reduced-motion: reduce) {
  .loading-card,
  .loading-logo,
  .loading-logo::after,
  .loading-logo-pulse,
  .loading-orb,
  .loading-dots span {
    animation: none;
  }
}

/* ── App shell ──────────────────────────────────────────────────────────── */
.app-shell { display: flex; height: 100vh; overflow: hidden; }
.app-main  { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-width: 0; position: relative; }
.global-search-floating { position: absolute !important; top: 18px; right: 28px; z-index: 35; }
.global-search-floating > div,
.global-search-floating > .btn-primary { box-shadow: var(--shadow); }
@media (max-width: 700px) {
  .global-search-floating { top: 12px; right: 12px; }
  .global-search-floating .btn-primary span { display: none; }
}

/* ── Sidebar — standard ─────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); display: flex; flex-direction: column;
  background: var(--surface); border-right: 1px solid var(--border);
  height: 100vh; overflow: hidden; flex-shrink: 0;
}
.sb-header { display: flex; align-items: center; padding: 16px 14px 10px; gap: 6px; }
.sb-logo   { display: flex; align-items: center; gap: 9px; flex: 1; }
.sb-logo-mark {
  width: 32px; height: 32px; background: var(--accent); color: #fff;
  border-radius: 9px; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 15px; flex-shrink: 0;
}
.sb-logo-text { font-weight: 800; font-size: 17px; letter-spacing: -.4px; color: var(--text); }
.sb-icon-btn {
  width: 30px; height: 30px; border-radius: 8px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s; flex-shrink: 0;
}
.sb-icon-btn:hover { background: var(--surface2); color: var(--text); }
.sb-lang { font-size: 11px; font-weight: 800; }

.sb-search-wrap {
  display: flex; align-items: center; gap: 7px;
  margin: 4px 10px 8px; padding: 7px 10px;
  background: var(--surface2); border-radius: 8px; border: 1px solid transparent;
  transition: border-color .15s;
}
.sb-search-wrap:focus-within { border-color: var(--accent); }
.sb-search-ico { color: var(--muted); display: flex; flex-shrink: 0; }
.sb-search { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 13px; }
.sb-search::placeholder { color: var(--muted); }
.sb-tag-filter {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 0 10px 11px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
.sb-tag-filter::-webkit-scrollbar { height: 5px; }
.sb-tag-filter::-webkit-scrollbar-track { background: transparent; }
.sb-tag-filter::-webkit-scrollbar-thumb {
  background: var(--border2);
  border-radius: 999px;
}
.sb-tag-filter:hover::-webkit-scrollbar-thumb { background: var(--muted); }
.sb-tag-chip {
  height: 26px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  border-radius: 999px;
  padding: 0 10px;
  font-size: 11px;
  font-weight: 800;
  white-space: nowrap;
  flex-shrink: 0;
}
.sb-tag-chip:hover,
.sb-tag-chip.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(99,102,241,.11);
}
.sb-tag-chip--project.active { border-color: #2563EB; color: #2563EB; background: rgba(37,99,235,.1); }
.sb-tag-chip--docs.active { border-color: #059669; color: #059669; background: rgba(5,150,105,.1); }
.sb-tag-chip--clients.active { border-color: #D97706; color: #D97706; background: rgba(217,119,6,.11); }
.sb-tag-chip--ideas.active { border-color: #DB2777; color: #DB2777; background: rgba(219,39,119,.1); }

.sb-scroll { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
.sb-scroll::-webkit-scrollbar { width: 3px; }
.sb-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.sb-section-label {
  font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .6px;
  text-transform: uppercase; padding: 12px 8px 4px;
}
.sb-chat-item {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px; color: var(--text2);
  text-align: left; font-size: 13px; font-weight: 500;
  transition: background .12s; position: relative;
}
.sb-chat-item:hover { background: var(--surface2); }
.sb-chat-item.active { background: var(--accent-lt); color: var(--accent); font-weight: 600; }
.sb-chat-ico { color: var(--muted); flex-shrink: 0; opacity: .7; }
.sb-chat-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-chat-tag {
  max-width: 72px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 2px 6px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 800;
  flex-shrink: 0;
}
.sb-chat-tag--project,
.sb-tag-dot--project { background: rgba(37,99,235,.12); color: #2563EB; }
.sb-chat-tag--docs,
.sb-tag-dot--docs { background: rgba(5,150,105,.12); color: #059669; }
.sb-chat-tag--clients,
.sb-tag-dot--clients { background: rgba(217,119,6,.13); color: #D97706; }
.sb-chat-tag--ideas,
.sb-tag-dot--ideas { background: rgba(219,39,119,.12); color: #DB2777; }
.sb-tag-dot {
  width: 24px;
  height: 24px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--muted);
  background: var(--surface);
  font-size: 10px;
  font-weight: 900;
  flex-shrink: 0;
}
.sb-tag-dot:hover { border-color: var(--accent); color: var(--accent); }
.sb-tag-dot.sb-tag-dot--project { background: rgba(37,99,235,.12); color: #2563EB; }
.sb-tag-dot.sb-tag-dot--docs { background: rgba(5,150,105,.12); color: #059669; }
.sb-tag-dot.sb-tag-dot--clients { background: rgba(217,119,6,.13); color: #D97706; }
.sb-tag-dot.sb-tag-dot--ideas { background: rgba(219,39,119,.12); color: #DB2777; }
.sb-tag-dot.sb-tag-dot--project:hover { border-color: #2563EB; }
.sb-tag-dot.sb-tag-dot--docs:hover { border-color: #059669; }
.sb-tag-dot.sb-tag-dot--clients:hover { border-color: #D97706; }
.sb-tag-dot.sb-tag-dot--ideas:hover { border-color: #DB2777; }
.sb-chat-dots { color: var(--muted); display: flex; padding: 2px; }
.sb-chat-actions {
  display: grid;
  grid-template-columns: repeat(2, 24px);
  gap: 3px;
  flex-shrink: 0;
}
.sb-chat-action-btn,
.sb-chat-actions .sb-tag-dot {
  width: 24px;
  height: 24px;
}
.sb-chat-actions .sb-tag-dot {
  font-size: 10px;
}
.sb-empty { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 32px 16px; color: var(--muted); font-size: 13px; }
.sb-empty-icon { opacity: .35; }

.sb-bottom { border-top: 1px solid var(--border); padding: 8px 6px; }
.sb-nav { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
.sb-nav-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px; color: var(--muted);
  font-size: 13px; font-weight: 500; transition: all .12s; text-align: left;
}
.sb-nav-btn:hover { background: var(--surface2); color: var(--text); }
.sb-nav-btn.active { background: var(--accent-lt); color: var(--accent); font-weight: 600; }

.sb-user-row { display: flex; align-items: center; gap: 4px; }
.sb-user-btn {
  flex: 1; display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: 9px; min-width: 0;
  transition: background .12s;
}
.sb-user-btn:hover { background: var(--surface2); }
.sb-user-info { flex: 1; min-width: 0; text-align: left; }
.sb-user-name  { font-size: 13px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-user-email { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-actions { display: flex; gap: 2px; flex-shrink: 0; }

/* ── Sidebar — Rail ──────────────────────────────────────────────────────── */
.sidebar--rail { width: 62px; align-items: center; padding: 12px 0; }
.rail-top, .rail-bottom { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; padding: 0 8px; }
.rail-top { flex: 1; }
.rail-btn {
  width: 42px; height: 42px; border-radius: 10px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s; font-size: 11px; font-weight: 800;
}
.rail-btn:hover { background: var(--surface2); color: var(--text); }
.rail-btn.active { background: var(--accent-lt); color: var(--accent); }
.rail-divider { width: 32px; height: 1px; background: var(--border); margin: 4px 0; }

/* ── Chat view ──────────────────────────────────────────────────────────── */
.chat-view { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 32px 0 16px;
  display: flex; flex-direction: column;
}
.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* ── Messages ───────────────────────────────────────────────────────────── */
.msg {
  display: flex; gap: 14px; padding: 10px 32px;
  animation: fadeIn .2s ease-out; max-width: 860px;
  width: 100%; margin: 0 auto; align-items: flex-start;
}
.msg--user { flex-direction: row; }
.msg-avatar { flex-shrink: 0; padding-top: 2px; }
.msg-helm-av {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800;
}
.msg-body { flex: 1; min-width: 0; }
.msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.msg-ts { font-size: 11px; color: var(--muted); }
.msg-text { font-size: 14.5px; line-height: 1.7; color: var(--text); }
.msg-text--user {
  background: var(--accent-lt); border-radius: 14px 14px 14px 4px;
  padding: 10px 15px; display: inline-block; max-width: 680px;
  font-size: 14px; color: var(--text);
}
.msg-text--ai { padding-top: 0; }
.msg-actions { display: flex; gap: 4px; margin-top: 8px; }
.msg-action {
  display: flex; align-items: center; gap: 5px; padding: 4px 9px;
  border-radius: 7px; background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); font-size: 12px; font-weight: 600;
  transition: all .15s;
}
.msg-action:hover { color: var(--text); border-color: var(--border2); }
.thinking-row { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; padding-top: 4px; }

/* ── Markdown body ──────────────────────────────────────────────────────── */
.markdown-body h1,.markdown-body h2,.markdown-body h3 { font-weight: 700; margin: 1.1em 0 .4em; line-height: 1.25; }
.markdown-body h1 { font-size: 1.35em; }
.markdown-body h2 { font-size: 1.18em; }
.markdown-body h3 { font-size: 1.05em; }
.markdown-body p  { margin-bottom: .65em; }
.markdown-body ul, .markdown-body ol { margin: .5em 0 .65em 1.3em; }
.markdown-body li { margin-bottom: .25em; }
.markdown-body strong { font-weight: 700; }
.markdown-body em { font-style: italic; }
.markdown-body code {
  font-family: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
  font-size: 13px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 5px; padding: 1px 5px; color: var(--accent);
}
.markdown-body pre {
  background: #1a1d27; border-radius: 10px; padding: 16px; margin: .8em 0;
  overflow-x: auto;
}
[data-theme="dark"] .markdown-body pre { background: #0d0f17; }
.markdown-body pre code {
  background: none; border: none; padding: 0; color: #e2e4ef; font-size: 13px;
  white-space: pre; line-height: 1.6;
}
.markdown-body table { width: 100%; border-collapse: collapse; margin: .8em 0; font-size: 13.5px; }
.markdown-body th { background: var(--surface2); padding: 8px 12px; text-align: left; font-weight: 700; border: 1px solid var(--border); }
.markdown-body td { padding: 8px 12px; border: 1px solid var(--border); }
.markdown-body blockquote { border-left: 3px solid var(--accent); margin: .8em 0; padding-left: 14px; color: var(--muted); }
.source-panel {
  margin-top: 12px;
  border: 1px solid var(--border);
  background: var(--surface2);
  border-radius: 12px;
  padding: 10px;
}
.source-panel-title {
  display: flex;
  align-items: center;
  gap: 7px;
  color: var(--text);
  font-size: 12px;
  font-weight: 800;
  margin-bottom: 8px;
}
.source-count {
  min-width: 20px;
  height: 20px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(99,102,241,.12);
  color: var(--accent);
  font-size: 11px;
}
.source-list { display: grid; gap: 8px; }
.source-card {
  border: 1px solid var(--border);
  background: var(--surface);
  border-radius: 10px;
  padding: 9px 10px;

/* ── Chat input ─────────────────────────────────────────────────────────── */
.chat-input-area { padding: 8px 24px 20px; flex-shrink: 0; }
.chat-input-card {

.chat-input-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.chat-tools-left { display: flex; gap: 2px; }
.chat-tool {
  width: 32px; height: 32px; border-radius: 8px; color: var(--muted);
  display: flex; align-items: center; justify-content: center; transition: all .12s;
}
.chat-tool:hover { background: var(--surface2); color: var(--text); }
.chat-send {
  width: 34px; height: 34px; border-radius: 9px; background: var(--border2);
  color: var(--muted); display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.chat-send.ready { background: var(--accent); color: #fff; }
.chat-send.ready:hover { background: var(--accent-dk); transform: scale(1.04); }
.chat-send:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* ── Auth ───────────────────────────────────────────────────────────────── */
.auth-screen { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 40px; width: 380px; box-shadow: var(--shadow-lg); }
.auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.auth-logo-mark {
  width: 36px; height: 36px; background: var(--accent); color: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px;
}
.auth-logo-text { font-size: 20px; font-weight: 800; color: var(--text); }
.auth-tagline { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.auth-tabs { display: flex; background: var(--surface2); border-radius: 9px; padding: 3px; gap: 2px; margin-bottom: 22px; }
.auth-tab { flex: 1; padding: 7px; border-radius: 7px; font-size: 13px; font-weight: 600; color: var(--muted); transition: all .15s; }
.auth-tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
.auth-field { margin-bottom: 14px; }
.auth-field label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; letter-spacing: .2px; }
.auth-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 13px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
.auth-input:focus { border-color: var(--accent); }
.auth-submit { width: 100%; background: var(--accent); color: #fff; border-radius: 9px; padding: 11px; font-size: 14px; font-weight: 700; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .15s; }
.auth-submit:hover { background: var(--accent-dk); }

/* ── Page base ──────────────────────────────────────────────────────────── */
.page { padding: 36px 40px; overflow-y: auto; height: 100vh; }
.page::-webkit-scrollbar { width: 5px; }
.page::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 5px; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; gap: 16px; }

.page-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
.btn-primary {
  display: flex; align-items: center; gap: 7px;
  background: var(--accent); color: #fff; border-radius: 9px;
  padding: 9px 16px; font-size: 13px; font-weight: 700;

}

.icon-btn-ghost { width: 30px; height: 30px; border-radius: 7px; color: var(--muted); display: flex; align-items: center; justify-content: center; transition: all .12s; flex-shrink: 0; }
.icon-btn-ghost:hover { background: var(--surface2); color: var(--text); }

/* ── Files page ─────────────────────────────────────────────────────────── */
.drop-zone {
  border: 2px dashed var(--border2); border-radius: 12px;
  padding: 28px; text-align: center; color: var(--muted); font-size: 13px;

  cursor: pointer; transition: all .15s; margin-bottom: 24px;
}
.drop-zone:hover, .drop-zone.dragging { border-color: var(--accent); background: var(--accent-lt); color: var(--accent); }

.files-list { display: flex; flex-direction: column; gap: 8px; }
.file-row { display: flex; align-items: center; gap: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 14px; transition: box-shadow .15s; }
.file-row:hover { box-shadow: var(--shadow); }
.file-info { flex: 1; min-width: 0; }
.file-name { font-size: 14px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
.file-status { font-size: 11.5px; font-weight: 700; padding: 3px 9px; border-radius: 6px; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.file-status--indexed { background: rgba(16,185,129,.12); color: #059669; }
.file-status--indexing { background: var(--accent-lt); color: var(--accent); }

/* ── Workspaces ─────────────────────────────────────────────────────────── */
.ws-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.ws-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; transition: box-shadow .15s, transform .15s; }
.ws-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.ws-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.ws-icon { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800; flex-shrink: 0; }
.ws-name { font-size: 16px; font-weight: 800; letter-spacing: -.3px; }
.ws-stats { display: flex; gap: 20px; margin-bottom: 20px; }
.ws-stat { }
.ws-stat-val { font-size: 20px; font-weight: 800; color: var(--text); }
.ws-stat-key { font-size: 11px; color: var(--muted); margin-top: 1px; }
.ws-open-btn { width: 100%; padding: 9px; border-radius: 8px; border: 1.5px solid var(--border2); color: var(--text2); font-size: 13px; font-weight: 600; transition: all .15s; }
.ws-open-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── Admin ──────────────────────────────────────────────────────────────── */
.stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 32px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.stat-val { font-size: 28px; font-weight: 800; letter-spacing: -.5px; margin-bottom: 4px; }
.stat-key { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
.admin-section-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
.users-table { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.users-thead { display: grid; grid-template-columns: 1.8fr 2fr 1fr 1.2fr 1fr; padding: 10px 16px; background: var(--surface2); font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--border); }
.users-row { display: grid; grid-template-columns: 1.8fr 2fr 1fr 1.2fr 1fr; padding: 12px 16px; align-items: center; border-bottom: 1px solid var(--border); font-size: 13px; transition: background .12s; }
.users-row:last-child { border-bottom: none; }
.users-row:hover { background: var(--surface2); }
.users-row-name { display: flex; align-items: center; gap: 9px; font-weight: 600; }
.users-email { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.role-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px; }
.role-badge.admin { background: var(--accent-lt); color: var(--accent); }
.role-badge.user { background: var(--surface2); color: var(--muted); }

/* ── Profile ────────────────────────────────────────────────────────────── */
.profile-wrap { max-width: 540px; }
.profile-hero { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
.profile-name { font-size: 18px; font-weight: 800; letter-spacing: -.3px; margin-bottom: 6px; }
.profile-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 16px; }
.profile-section-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 16px; }
.profile-field { margin-bottom: 14px; }
.profile-field label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; }
.profile-input { width: 100%; background: var(--bg); border: 1.5px solid var(--border); border-radius: 9px; padding: 10px 13px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
.profile-input:focus { border-color: var(--accent); }
.pref-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
.pref-row:last-child { border-bottom: none; padding-bottom: 0; }
.pref-label { font-size: 13.5px; font-weight: 500; }
.toggle-group { display: flex; background: var(--surface2); border-radius: 8px; padding: 3px; gap: 2px; }
.tg-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; color: var(--muted); transition: all .15s; }
.tg-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
.logout-btn { display: flex; align-items: center; gap: 8px; color: #EF4444; font-size: 13px; font-weight: 600; padding: 10px 14px; border-radius: 9px; transition: background .15s; }
.logout-btn:hover { background: rgba(239,68,68,.08); }

/* ── Tweaks panel ───────────────────────────────────────────────────────── */
.tweaks-panel { position: fixed; bottom: 20px; right: 20px; z-index: 999; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; width: 220px; box-shadow: var(--shadow-lg); animation: fadeIn .15s ease-out; }
.tweaks-title { font-size: 11px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 12px; }
.tw-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.tw-row:last-child { margin-bottom: 0; }
.tw-label { font-size: 13px; font-weight: 500; color: var(--text2); }
.tw-toggle-group { display: flex; background: var(--surface2); border-radius: 7px; padding: 2px; gap: 2px; }
.tw-tg-btn { padding: 4px 9px; border-radius: 5px; font-size: 12px; font-weight: 600; color: var(--muted); transition: all .12s; }
.tw-tg-btn.on { background: var(--surface); color: var(--text); box-shadow: 0 1px 3px rgba(0,0,0,.1); }

/* ── Page transitions ───────────────────────────────────────────────────── */
@keyframes pageEnter {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}
.page-anim { animation: pageEnter .22s cubic-bezier(.22,1,.36,1); height: 100%; display: flex; flex-direction: column; }

/* ── Back button ────────────────────────────────────────────────────────── */
.back-btn {
  width: 34px; height: 34px; border-radius: 9px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;

}
.back-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }

.drawer-overlay {

.drawer-stat-val { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
.drawer-stat-key { font-size: 11px; color: var(--muted); margin-top: 2px; }
.drawer-section-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }

/* Mini bar chart */
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 56px; background: var(--surface2); border-radius: 8px; padding: 8px 10px; }
.mini-bar-wrap { flex: 1; display: flex; align-items: flex-end; }
.mini-bar { width: 100%; min-height: 3px; background: var(--accent); border-radius: 3px 3px 0 0; opacity: .7; transition: height .4s cubic-bezier(.22,1,.36,1); }

.drawer-actions { display: flex; flex-direction: column; gap: 6px; }
.drawer-action-btn {
  display: flex; align-items: center; gap: 9px; padding: 10px 14px;
  border-radius: 9px; border: 1.5px solid var(--border); color: var(--text2);
  font-size: 13px; font-weight: 600; transition: all .15s; text-align: left;
}
.drawer-action-btn:hover { background: var(--surface2); border-color: var(--border2); }
.drawer-action-btn--danger { color: #EF4444; }
.drawer-action-btn--danger:hover { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.3); }

/* ── Btn danger ──────────────────────────────────────────────────────────── */
.btn-danger {
  display: flex; align-items: center; gap: 7px;
  border: 1.5px solid rgba(239,68,68,.4); color: #EF4444;
  border-radius: 9px; padding: 9px 16px; font-size: 13px; font-weight: 700;
  transition: all .15s;
}
.btn-danger:hover { background: rgba(239,68,68,.08); border-color: rgba(239,68,68,.7); }

/* ── Button ripple micro-interaction ────────────────────────────────────── */
.btn-primary { position: relative; overflow: hidden; }
.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,.15); opacity: 0; border-radius: inherit;
  transition: opacity .15s;
}
.btn-primary:active::after { opacity: 1; }
.btn-primary:active { transform: scale(.97); }

/* ── Stat card hover ────────────────────────────────────────────────────── */
.stat-card { transition: box-shadow .2s, transform .2s; }
.stat-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

/* ── Confirm row ────────────────────────────────────────────────────────── */
.confirm-row { padding: 12px 14px; border-radius: 9px; border: 1.5px solid rgba(239,68,68,.35); background: rgba(239,68,68,.05); display: flex; flex-direction: column; gap: 10px; }
.confirm-label { font-size: 13px; font-weight: 600; color: #EF4444; }
.confirm-btn { padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 700; transition: all .15s; }
.confirm-btn--yes { background: #EF4444; color: #fff; }
.confirm-btn--yes:hover { background: #DC2626; }
.confirm-btn--no { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.confirm-btn--no:hover { border-color: var(--border2); }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .suggestion-grid { grid-template-columns: 1fr; }
  .msg { padding: 10px 16px; }
  .page { padding: 24px 20px; }
  .drawer { width: 100%; }
}
