<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helm — AI-ассистент</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #6366f1;
    --accent-hover: #4f52d9;
    --text: #e2e4ef;
    --muted: #6b7280;
    --user-bubble: #1e2235;
    --ai-bubble: #161926;
    --error: #ef4444;
    --success: #22c55e;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Auth screen ── */
  #auth-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    width: 380px;
  }

  .auth-card h1 {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .auth-card p {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
    margin-top: 4px;
  }

  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .auth-toggle {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .auth-toggle a {
    color: var(--accent);
    cursor: pointer;
    text-decoration: none;
  }

  .auth-toggle a:hover { text-decoration: underline; }

  .auth-error {
    background: rgba(239,68,68,.12);
    border: 1px solid rgba(239,68,68,.3);
    color: #fca5a5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  /* ── Chat screen ── */
  #chat-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .logo {
    width: 30px; height: 30px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: #fff;
  }

  header h2 { font-size: 16px; font-weight: 600; }

  .header-right { display: flex; align-items: center; gap: 16px; }

  #user-name { font-size: 13px; color: var(--muted); }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 7px;
    padding: 5px 12px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--text); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg { display: flex; gap: 12px; max-width: 820px; }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
  }

  .msg.user .avatar { background: var(--accent); color: #fff; }
  .msg.assistant .avatar { background: var(--surface); border: 1px solid var(--border); color: var(--muted); }

  .bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 680px;
    word-break: break-word;
    white-space: pre-wrap;
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    border-top-right-radius: 4px;
  }

  .msg.assistant .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .meta-tag {
    display: inline-block;
    font-size: 10px;
    background: rgba(99,102,241,.15);
    color: #818cf8;
    border-radius: 4px;
    padding: 2px 6px;
    margin-bottom: 6px;
    letter-spacing: .3px;
  }

  .cursor {
    display: inline-block;
    width: 2px; height: 14px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink .7s step-end infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--muted);
    font-size: 14px;
  }

  .empty-state .icon {
    font-size: 40px;
    opacity: .4;
  }

  /* Input area */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    transition: border-color .2s;
  }

  .input-row:focus-within { border-color: var(--accent); }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    resize: none;
    outline: none;
    max-height: 140px;
    line-height: 1.5;
    font-family: inherit;
  }

  #input::placeholder { color: var(--muted); }

  #send-btn {
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background .2s, transform .1s;
  }

  #send-btn:hover { background: var(--accent-hover); }
  #send-btn:active { transform: scale(.94); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; }

  .hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>⚡ Helm</h1>
    <p id="auth-subtitle">Корпоративный AI-ассистент</p>

    <div id="register-fields" style="display:none">
      <div class="field">
        <label>Имя</label>
        <input id="reg-name" type="text" placeholder="Иван Иванов">
      </div>
    </div>

    <div class="field">
      <label>Email</label>
      <input id="auth-email" type="email" placeholder="you@company.com">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input id="auth-password" type="password" placeholder="••••••••">
    </div>

    <button class="btn" id="auth-btn" onclick="submitAuth()">Войти</button>

    <div class="auth-toggle">
      <span id="toggle-text">Нет аккаунта?</span>
      <a onclick="toggleMode()">Зарегистрироваться</a>
    </div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen">
  <header>
    <div class="header-left">
      <div class="logo">H</div>
      <h2>Helm</h2>
    </div>
    <div class="header-right">
      <span id="user-name"></span>
      <button class="btn-sm" onclick="newChat()">+ Новый чат</button>
      <button class="btn-sm" onclick="logout()">Выйти</button>
    </div>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <span>Задай любой вопрос</span>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" rows="1" placeholder="Напиши сообщение..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Отправить (Enter)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="hint">Enter — отправить · Shift+Enter — новая строка</div>
  </div>
</div>

<script>
const API = 'http://localhost:8000/api';
let token = localStorage.getItem('helm_token');
let userName = localStorage.getItem('helm_user');
let chatId = null;
let isRegister = false;
let isStreaming = false;

// ── Init ──
if (token) showChat();

// ── Auth ──
function toggleMode() {
  isRegister = !isRegister;
  document.getElementById('register-fields').style.display = isRegister ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = isRegister ? 'Зарегистрироваться' : 'Войти';
  document.getElementById('toggle-text').textContent = isRegister ? 'Уже есть аккаунт?' : 'Нет аккаунта?';
  document.querySelector('.auth-toggle a').textContent = isRegister ? 'Войти' : 'Зарегистрироваться';
  document.getElementById('auth-error').style.display = 'none';
}

async function submitAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const name = document.getElementById('reg-name').value.trim();
  const btn = document.getElementById('auth-btn');
  const errEl = document.getElementById('auth-error');

  if (!email || !password) return;
  if (isRegister && !name) return;

  btn.disabled = true;
  btn.textContent = '...';
  errEl.style.display = 'none';

  try {
    const url = isRegister ? `${API}/auth/register` : `${API}/auth/login`;
    const body = isRegister ? { email, password, name } : { email, password };
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Ошибка');

    token = data.access_token;
    localStorage.setItem('helm_token', token);

    // Получаем имя из профиля
    const profile = await fetch(`${API}/profile`, { headers: { Authorization: `Bearer ${token}` } });
    const pdata = await profile.json();
    userName = pdata.name;
    localStorage.setItem('helm_user', userName);

    showChat();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = isRegister ? 'Зарегистрироваться' : 'Войти';
  }
}

document.getElementById('auth-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAuth();
});

// ── Chat init ──
async function showChat() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display = 'flex';
  document.getElementById('user-name').textContent = userName || '';
  await createChat();
  document.getElementById('input').focus();
}

async function createChat() {
  const res = await fetch(`${API}/chats`, {
    method: 'POST',
    headers: { Authorization: `Bearer ${token}` },
  });
  if (res.status === 401) { logout(); return; }
  const data = await res.json();
  chatId = data.id;
}

function newChat() {
  document.getElementById('messages').innerHTML = `
    <div class="empty-state" id="empty-state">
      <div class="icon">💬</div>
      <span>Задай любой вопрос</span>
    </div>`;
  createChat();
  document.getElementById('input').focus();
}

function logout() {
  localStorage.removeItem('helm_token');
  localStorage.removeItem('helm_user');
  token = null; chatId = null;
  document.getElementById('chat-screen').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-password').value = '';
}

// ── Send message ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isStreaming || !chatId) return;

  // Hide empty state
  const es = document.getElementById('empty-state');
  if (es) es.remove();

  // Add user message
  appendMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  // Placeholder for assistant
  const aiEl = appendMessage('assistant', '', true);
  const bubble = aiEl.querySelector('.bubble');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  bubble.appendChild(cursor);

  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  try {
    const res = await fetch(`${API}/chats/${chatId}/messages`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
        Accept: 'text/event-stream',
      },
      body: JSON.stringify({ content: text }),
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    let metaShown = false;

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const evt = JSON.parse(line.slice(6));

          if (evt.type === 'meta' && !metaShown) {
            const tag = document.createElement('div');
            tag.className = 'meta-tag';
            tag.textContent = evt.model;
            bubble.insertBefore(tag, cursor);
            metaShown = true;
          }

          if (evt.type === 'token') {
            fullText += evt.content;
            // Update text node before cursor
            let textNode = bubble.querySelector('.text-content');
            if (!textNode) {
              textNode = document.createElement('span');
              textNode.className = 'text-content';
              bubble.insertBefore(textNode, cursor);
            }
            textNode.textContent = fullText;
            scrollToBottom();
          }

          if (evt.type === 'error') {
            bubble.querySelector('.text-content') || bubble.insertBefore(
              Object.assign(document.createElement('span'), {
                className: 'text-content',
                textContent: '⚠️ ' + (evt.detail || 'Ошибка LLM'),
                style: 'color: #fca5a5'
              }), cursor
            );
          }

          if (evt.type === 'done' || evt.type === 'error') {
            cursor.remove();
          }

        } catch { /* skip malformed */ }
      }
    }
  } catch (e) {
    bubble.textContent = '⚠️ Ошибка соединения: ' + e.message;
    cursor.remove();
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('input').focus();
  }
}

function appendMessage(role, text, empty = false) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? (userName?.[0]?.toUpperCase() || 'U') : 'H';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (!empty) {
    const span = document.createElement('span');
    span.className = 'text-content';
    span.textContent = text;
    bubble.appendChild(span);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
