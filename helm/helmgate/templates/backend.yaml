apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helmgate.fullname" . }}-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-backend
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "helmgate.fullname" . }}-postgres 5432; do echo waiting for postgres; sleep 2; done']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "helmgate.fullname" . }}-redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ include "helmgate.fullname" . }}-postgres:5432/{{ .Values.postgres.database }}"
            - name: REDIS_URL
              value: "redis://{{ include "helmgate.fullname" . }}-redis:6379/0"
            - name: OPENROUTER_BASE_URL
              value: {{ .Values.backend.env.openrouterBaseUrl | quote }}
            - name: DEFAULT_DAILY_TOKEN_LIMIT
              value: {{ .Values.backend.env.defaultDailyTokenLimit | quote }}
            - name: LOW_BALANCE_THRESHOLD_RUB
              value: {{ .Values.backend.env.lowBalanceThresholdRub | quote }}
            - name: CIRCUIT_BREAKER_FAILURE_THRESHOLD
              value: {{ .Values.backend.env.circuitBreakerFailureThreshold | quote }}
            - name: CIRCUIT_BREAKER_COOLDOWN_SECONDS
              value: {{ .Values.backend.env.circuitBreakerCooldownSeconds | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmgate.fullname" . }}-secrets
                  key: SECRET_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmgate.fullname" . }}-secrets
                  key: OPENROUTER_API_KEY
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmgate.fullname" . }}-secrets
                  key: GROQ_API_KEY
            - name: TELEGRAM_ALERT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmgate.fullname" . }}-secrets
                  key: TELEGRAM_ALERT_TOKEN
            - name: TELEGRAM_ALERT_CHAT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmgate.fullname" . }}-secrets
                  key: TELEGRAM_ALERT_CHAT_ID
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: chroma
              mountPath: /app/chroma
      volumes:
        - name: uploads
          emptyDir: {}
        - name: chroma
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helmgate.fullname" . }}-backend
spec:
  selector:
    app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
