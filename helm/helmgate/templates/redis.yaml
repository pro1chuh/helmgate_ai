apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helmgate.fullname" . }}-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          args:
            - redis-server
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
            - --save
            - ""
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helmgate.fullname" . }}-redis
spec:
  selector:
    app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-redis
  ports:
    - port: 6379
      targetPort: 6379
