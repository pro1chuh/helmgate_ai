apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helmgate.fullname" . }}-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmgate.fullname" . }}-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helmgate.fullname" . }}-postgres
spec:
  selector:
    app.kubernetes.io/name: {{ include "helmgate.fullname" . }}-postgres
  ports:
    - port: 5432
      targetPort: 5432
